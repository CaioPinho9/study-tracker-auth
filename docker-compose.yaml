services:
  postgres:
    image: postgres:16
    container_name: daily-ritual-postgres
    environment:
      POSTGRES_DB: study_tracker
      POSTGRES_USER: study
      POSTGRES_PASSWORD: study
    ports:
      - "5432:5432"
    volumes:
      - study_tracker_db_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d

volumes:
  study_tracker_db_data:
